name: Deploy to VPS

on:
  push:
    branches:
      - main  # سيعمل النشر التلقائي فقط عند الدفع لفرع main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود داخل سيرفرات جيتهاب المؤقتة لضمان وجوده
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. الاتصال بالـ VPS وتشغيل أوامر التحديث
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/kadin/app/CIDC-Test/CI-CD
            git pull origin main
            npm install
            
            # 1. Buat file .env secara fisik di server
            echo "NEXT_PUBLIC_APP_MESSAGE=${{ secrets.NEXT_PUBLIC_APP_MESSAGE }}" > .env
            
            # 2. Export juga ke dalam sesi terminal aktif saat build
            export NEXT_PUBLIC_APP_MESSAGE="${{ secrets.NEXT_PUBLIC_APP_MESSAGE }}"
            
            # 3. Jalankan build dengan env yang sudah dipastikan ada
            npm run build
            
            # 4. Hapus cache PM2 lama dan jalankan ulang aplikasinya
            pm2 delete all || true
            pm2 startOrReload ecosystem.config.js --update-env